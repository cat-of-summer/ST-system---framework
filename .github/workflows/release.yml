name: release

on:
  create:

permissions:
  contents: write
  packages: write

jobs:
  get-branch:
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.find-branch.outputs.branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: find-branch
        run: |
          BRANCH=$(git branch -r --contains ${{ github.sha }} | grep -v HEAD | head -1 | sed 's/.*origin\///')
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT

  release:
    needs: get-branch
    runs-on: ubuntu-latest

    environment: ${{ needs.get-branch.outputs.branch }}

    outputs:
      publish_method: ${{ vars.PUBLISH_METHOD }}

    env:
      BUILD_COMMAND: ${{ vars.BUILD_COMMAND }}
      RELEASE_FILES: ${{ vars.RELEASE_FILES }}

    steps:
      - uses: actions/checkout@v4

      - name: Build
        if: ${{ env.BUILD_COMMAND != '' }}
        shell: bash
        run: |
          set -euo pipefail
          eval "$BUILD_COMMAND"

      - name: Flatten release asset names
        id: stage
        if: ${{ env.RELEASE_FILES != '' }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          out=".release-staging"
          rm -rf "$out"
          mkdir -p "$out"

          set -f
          # shellcheck disable=SC2206
          patterns=( ${RELEASE_FILES//,/ } )
          set +f

          staged=()
          for pattern in "${patterns[@]}"; do
            base="${pattern%%[*?[{]*}"
            eval "matches=( $pattern )"
            for f in "${matches[@]}"; do
              [ -f "$f" ] || continue
              rel="${f#"$base"}"
              if [ -z "$rel" ] || [ "$rel" = "$f" ]; then
                rel="$(basename "$f")"
              fi
              flat="${rel//\//__}"
              cp "$f" "$out/$flat"
              staged+=("$out/$flat")
            done
          done
          if [ ${#staged[@]} -eq 0 ]; then
            echo "No files matched RELEASE_FILES: $RELEASE_FILES" >&2
            exit 1
          fi
          printf 'Staged %s file(s):\n' "${#staged[@]}"
          printf '  %s\n' "${staged[@]}"
          {
            echo "files<<EOF"
            printf '%s\n' "${staged[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.stage.outputs.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    needs: [get-branch, release]
    if: ${{ needs.release.outputs.publish_method == 'npm' }}
    runs-on: ubuntu-latest

    environment: ${{ needs.get-branch.outputs.branch }}

    env:
      BUILD_COMMAND: ${{ vars.BUILD_COMMAND }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          registry-url: 'https://npm.pkg.github.com'

      - name: Build
        if: ${{ env.BUILD_COMMAND != '' }}
        shell: bash
        run: |
          set -euo pipefail
          eval "$BUILD_COMMAND"

      - name: Override npm auth for publish
        run: sed -i 's|//npm.pkg.github.com/:_authToken=.*|//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}|' .npmrc

      - name: Set version from tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          if [[ ! "$TAG" =~ ^v([0-9]+(\.[0-9]+)*)$ ]]; then
            echo "::error::Tag '$TAG' is not a version tag (expected v#, v#.#, v#.#.#)." >&2
            exit 1
          fi
          NUM="${BASH_REMATCH[1]}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$NUM"
          VERSION="${MAJOR:-0}.${MINOR:-0}.${PATCH:-0}"
          echo "Tag $TAG -> package version $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - run: npm publish

  docker-publish:
    needs: [get-branch, release]
    if: ${{ needs.release.outputs.publish_method == 'docker' }}
    runs-on: ubuntu-latest

    environment: ${{ needs.get-branch.outputs.branch }}

    env:
      DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY || 'ghcr.io' }}
      DOCKER_IMAGE: ${{ vars.DOCKER_IMAGE || github.repository }}
      DOCKERFILE_PATH: ${{ vars.DOCKERFILE_PATH || './Dockerfile' }}
      DOCKER_CONTEXT: ${{ vars.DOCKER_CONTEXT || '.' }}
      BUILD_COMMAND: ${{ vars.BUILD_COMMAND }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate Dockerfile
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "$DOCKERFILE_PATH" ]; then
            echo "::error::Dockerfile not found at '$DOCKERFILE_PATH'. The docker publish method requires a Dockerfile (set DOCKERFILE_PATH to override the default ./Dockerfile)." >&2
            exit 1
          fi

      - name: Build
        if: ${{ env.BUILD_COMMAND != '' }}
        shell: bash
        run: |
          set -euo pipefail
          eval "$BUILD_COMMAND"

      - name: Resolve image ref & version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="$(echo "${DOCKER_REGISTRY}/${DOCKER_IMAGE}" | tr '[:upper:]' '[:lower:]')"

          TAG="${{ github.ref_name }}"
          if [[ ! "$TAG" =~ ^v?([0-9]+(\.[0-9]+)*)$ ]]; then
            echo "::error::Tag '$TAG' is not a version tag (expected v#, v#.#, v#.#.#)." >&2
            exit 1
          fi
          VERSION="${BASH_REMATCH[1]}"

          echo "Image: $IMAGE"
          echo "Version: $VERSION"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ vars.DOCKER_USERNAME || github.actor }}
          password: ${{ secrets.DOCKER_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.DOCKER_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest

  packagist-publish:
    needs: [get-branch, release]
    if: ${{ needs.release.outputs.publish_method == 'packagist' }}
    runs-on: ubuntu-latest

    environment: ${{ needs.get-branch.outputs.branch }}

    steps:
      - name: Publish to Packagist (update; create on first publish)
        shell: bash
        env:
          PACKAGIST_USERNAME: ${{ vars.PACKAGIST_USERNAME }}
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
          REPO_URL: https://github.com/${{ github.repository }}
        run: |
          set -euo pipefail

          # 1) Пробуем обновить уже существующий пакет.
          update_code=$(curl -sS -o /tmp/packagist.out -w '%{http_code}' -X POST \
            -H 'Content-Type: application/json' \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_API_TOKEN}" \
            -d "{\"repository\":{\"url\":\"${REPO_URL}\"}}")

          if [ "$update_code" -ge 200 ] && [ "$update_code" -lt 300 ]; then
            echo "Packagist: пакет обновлён."
            cat /tmp/packagist.out; echo
            exit 0
          fi

          if [ "$update_code" != "404" ]; then
            echo "::error::Packagist update failed (HTTP $update_code)"
            cat /tmp/packagist.out; echo
            exit 1
          fi

          # 2) 404 — пакета ещё нет: создаём (первая публикация). Требует MAIN-токен.
          echo "Packagist: пакет не найден, создаю (первая публикация)…"
          create_code=$(curl -sS -o /tmp/packagist.out -w '%{http_code}' -X POST \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer ${PACKAGIST_USERNAME}:${PACKAGIST_API_TOKEN}" \
            https://packagist.org/api/create-package \
            -d "{\"repository\":\"${REPO_URL}\"}")

          if [ "$create_code" -ge 200 ] && [ "$create_code" -lt 300 ]; then
            echo "Packagist: пакет создан."
            cat /tmp/packagist.out; echo
          else
            echo "::error::Packagist create failed (HTTP $create_code) — нужен MAIN API-токен."
            cat /tmp/packagist.out; echo
            exit 1
          fi
